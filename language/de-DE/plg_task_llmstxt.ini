PLG_TASK_LLMSTXT_SECTION_SOURCE_CATEGORY="Inhaltskategorien"
PLG_TASK_LLMSTXT_SECTION_SOURCE_ARTICLES="Beiträge (alle)"
PLG_TASK_LLMSTXT_SECTION_MENUTYPE_LABEL="Menü"
PLG_TASK_LLMSTXT_SECTION_MENU_INCLUDE_LABEL="Nur diese Einträge"
PLG_TASK_LLMSTXT_SECTION_MENU_INCLUDE_DESC="Beschränkt diesen Abschnitt auf die ausgewählten Menüeinträge. Leer lassen, um alle Einträge des Menüs aufzunehmen."
PLG_TASK_LLMSTXT_SECTION_MENU_EXCLUDE_LABEL="Einträge ausschließen"
PLG_TASK_LLMSTXT_SECTION_MENU_EXCLUDE_DESC="Menüeinträge, die in diesem Abschnitt weggelassen werden."
PLG_TASK_LLMSTXT_SECTION_INCLUDE_SUBMENU_LABEL="Untermenü-Einträge einbeziehen"
PLG_TASK_LLMSTXT_SECTION_INCLUDE_SUBMENU_DESC="Verschachtelte Menüeinträge einbeziehen. Ausschalten, um nur Einträge der obersten Ebene aufzulisten."
PLG_TASK_LLMSTXT_SECTION_INCLUDE_SUBCATEGORIES_LABEL="Unterkategorien einbeziehen"
PLG_TASK_LLMSTXT_SECTION_INCLUDE_SUBCATEGORIES_DESC="Auch Beiträge aus Unterkategorien der ausgewählten Kategorien einbeziehen."
PLG_TASK_LLMSTXT_SECTION_ARTICLE_INCLUDE_LABEL="Nur diese Beiträge"
PLG_TASK_LLMSTXT_SECTION_ARTICLE_INCLUDE_DESC="Beschränkt diesen Abschnitt auf die ausgewählten Beiträge. Leer lassen, um alle passenden Beiträge aufzunehmen."
PLG_TASK_LLMSTXT_SECTION_ARTICLE_EXCLUDE_LABEL="Beiträge ausschließen"
PLG_TASK_LLMSTXT_SECTION_ARTICLE_EXCLUDE_DESC="Beiträge, die in diesem Abschnitt weggelassen werden."
PLG_TASK_LLMSTXT_SECTION_LANGUAGE_LABEL="Sprache"
PLG_TASK_LLMSTXT_SECTION_LANGUAGE_DESC="Nur Einträge in dieser Sprache aufnehmen; sprachneutrale Einträge werden immer beibehalten. Auf Alle Sprachen lassen, um den Filter zu deaktivieren."
