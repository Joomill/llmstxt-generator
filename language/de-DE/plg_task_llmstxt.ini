PLG_TASK_LLMSTXT="Task - LLMs.txt Generator"
PLG_TASK_LLMSTXT_XML_DESCRIPTION="Erstellt eine kuratierte /llms.txt-Datei aus Ihren Menüs und Inhalten und schreibt sie in das Stammverzeichnis Ihrer Website. Fügen Sie sie als geplante Aufgabe hinzu, um die Datei automatisch aktuell zu halten."
PLG_TASK_LLMSTXT_HELP_URL="https://www.joomill-extensions.com/documentation/llms-txt-generator-plugin"

PLG_TASK_LLMSTXT_GENERATE_TITLE="llms.txt erstellen"
PLG_TASK_LLMSTXT_GENERATE_DESC="Erstellt die llms.txt-Datei aus dem konfigurierten Kopfbereich und den Abschnitten und schreibt sie in das Stammverzeichnis der Website."

PLG_TASK_LLMSTXT_FIELDSET_GENERAL_LABEL="llms.txt"

PLG_TASK_LLMSTXT_BASE_URL_LABEL="Website-URL"
PLG_TASK_LLMSTXT_BASE_URL_DESC="Absolute URL Ihrer Website, um Links zu erstellen, wenn die Aufgabe über CLI-Cron läuft, zum Beispiel https://www.example.com. Leer lassen zur automatischen Erkennung (empfohlen beim Ausführen über Web-Cron)."
PLG_TASK_LLMSTXT_OUTPUT_FILE_LABEL="Ausgabedatei"
PLG_TASK_LLMSTXT_OUTPUT_FILE_DESC="Dateiname, der in das Stammverzeichnis der Website geschrieben wird. Der llms.txt-Standard erwartet den Namen llms.txt."
PLG_TASK_LLMSTXT_REMOVE_LANGUAGE_CODE_LABEL="URL-Sprachcode entfernen"
PLG_TASK_LLMSTXT_REMOVE_LANGUAGE_CODE_DESC="Entfernt den Sprachcode aus generierten URLs, z. B. /en/seite wird zu /seite. Nützlich bei mehrsprachigen Websites, bei denen das Sprachpräfix nicht in der llms.txt erscheinen soll."
PLG_TASK_LLMSTXT_SITE_TITLE_LABEL="Titel (H1)"
PLG_TASK_LLMSTXT_SITE_TITLE_DESC="Die Hauptüberschrift der Datei. Leer lassen, um den Website-Namen zu verwenden."
PLG_TASK_LLMSTXT_SUMMARY_LABEL="Zusammenfassung (Blockzitat)"
PLG_TASK_LLMSTXT_SUMMARY_DESC="Ein oder zwei Sätze, die Ihre Website beschreiben. Wird als Blockzitat direkt unter dem Titel dargestellt."
PLG_TASK_LLMSTXT_INTRO_LABEL="Einleitungsabsatz"
PLG_TASK_LLMSTXT_INTRO_DESC="Optionaler Absatz mit zusätzlichem Kontext, angezeigt nach der Zusammenfassung."

PLG_TASK_LLMSTXT_SECTIONS_LABEL="Abschnitte"
PLG_TASK_LLMSTXT_SECTIONS_DESC="Jeder Abschnitt wird zu einer H2-Überschrift mit einer kuratierten Liste von Links. Benennen Sie einen Abschnitt Optional, um die llms.txt-Optional-Konvention zu verwenden (Agenten dürfen ihn bei Kontextdruck überspringen)."
PLG_TASK_LLMSTXT_SECTION_HEADING_LABEL="Überschrift"
PLG_TASK_LLMSTXT_SECTION_SOURCE_LABEL="Quelle"
