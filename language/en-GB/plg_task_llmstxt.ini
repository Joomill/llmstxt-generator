PLG_TASK_LLMSTXT_BASE_URL_LABEL="Site URL"
PLG_TASK_LLMSTXT_BASE_URL_DESC="Absolute URL of your site, used to build links when the task runs from CLI cron, for example https://www.example.com. Leave empty to auto-detect (recommended when running via the web-cron)."
PLG_TASK_LLMSTXT_OUTPUT_FILE_LABEL="Output file"
PLG_TASK_LLMSTXT_OUTPUT_FILE_DESC="File name written to the site root. The llms.txt standard expects it to be called llms.txt."
