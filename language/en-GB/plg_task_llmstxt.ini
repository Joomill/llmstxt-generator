PLG_TASK_LLMSTXT_HELP_URL="https://www.joomill-extensions.com/documentation/llmstxt-generator"

PLG_TASK_LLMSTXT_GENERATE_TITLE="Generate llms.txt"
PLG_TASK_LLMSTXT_GENERATE_DESC="Builds the llms.txt file from the configured header and sections and writes it to the site root."

