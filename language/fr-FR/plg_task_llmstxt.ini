PLG_TASK_LLMSTXT_SUMMARY_DESC="Une ou deux phrases décrivant votre site. Affiché comme citation directement sous le titre."
PLG_TASK_LLMSTXT_INTRO_LABEL="Paragraphe d'introduction"
PLG_TASK_LLMSTXT_INTRO_DESC="Paragraphe facultatif avec un contexte supplémentaire, affiché après le résumé."

PLG_TASK_LLMSTXT_SECTIONS_LABEL="Sections"
PLG_TASK_LLMSTXT_SECTIONS_DESC="Chaque section devient un titre H2 avec une liste organisée de liens. Nommez une section Optional pour utiliser la convention Optional de llms.txt (les agents peuvent l'ignorer en cas de contrainte de contexte)."
