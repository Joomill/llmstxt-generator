PLG_TASK_LLMSTXT="Task - LLMs.txt Generator"
PLG_TASK_LLMSTXT_XML_DESCRIPTION="Génère un fichier /llms.txt organisé à partir de vos menus et de votre contenu et l'écrit à la racine de votre site. Ajoutez-le comme tâche planifiée pour maintenir le fichier à jour automatiquement."
PLG_TASK_LLMSTXT_HELP_URL="https://www.joomill-extensions.com/documentation/llmstxt-generator"

PLG_TASK_LLMSTXT_GENERATE_TITLE="Générer llms.txt"
PLG_TASK_LLMSTXT_GENERATE_DESC="Construit le fichier llms.txt à partir de l'en-tête et des sections configurés et l'écrit à la racine du site."

PLG_TASK_LLMSTXT_FIELDSET_GENERAL_LABEL="llms.txt"

PLG_TASK_LLMSTXT_BASE_URL_LABEL="URL du site"
PLG_TASK_LLMSTXT_BASE_URL_DESC="URL absolue de votre site, utilisée pour construire les liens lorsque la tâche s'exécute via le cron CLI, par exemple https://www.example.com. Laissez vide pour une détection automatique (recommandé lors de l'exécution via le web-cron)."
PLG_TASK_LLMSTXT_OUTPUT_FILE_LABEL="Fichier de sortie"
PLG_TASK_LLMSTXT_OUTPUT_FILE_DESC="Nom du fichier écrit à la racine du site. Le standard llms.txt attend le nom llms.txt."
PLG_TASK_LLMSTXT_REMOVE_LANGUAGE_CODE_LABEL="Supprimer le code de langue de l'URL"
PLG_TASK_LLMSTXT_REMOVE_LANGUAGE_CODE_DESC="Supprime le code de langue des URL générées, par ex. /en/page devient /page. Utile sur les sites multilingues où le préfixe de langue ne doit pas apparaître dans llms.txt."
PLG_TASK_LLMSTXT_SITE_TITLE_LABEL="Titre (H1)"
PLG_TASK_LLMSTXT_SITE_TITLE_DESC="Le titre principal du fichier. Laissez vide pour utiliser le nom du site."
