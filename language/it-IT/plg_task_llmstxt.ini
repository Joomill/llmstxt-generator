PLG_TASK_LLMSTXT_BASE_URL_DESC="URL assoluto del tuo sito, utilizzato per costruire i link quando l'attività viene eseguita da cron CLI, ad esempio https://www.example.com. Lascia vuoto per il rilevamento automatico (consigliato quando si esegue tramite web-cron)."
PLG_TASK_LLMSTXT_OUTPUT_FILE_LABEL="File di output"
PLG_TASK_LLMSTXT_OUTPUT_FILE_DESC="Nome del file scritto nella radice del sito. Lo standard llms.txt prevede il nome llms.txt."
